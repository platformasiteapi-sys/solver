#cloud-config

package_update: true
package_upgrade: false

packages:
  - curl
  - wget
  - git
  - apt-transport-https
  - ca-certificates
  - software-properties-common
  - unzip

runcmd:
  # 1. Install Docker
  - curl -fsSL https://get.docker.com -o /root/get-docker.sh
  - sh /root/get-docker.sh
  
  # 2. Setup project structure
  - mkdir -p /root/solver_project/solver_api
  - cd /root/solver_project
  
  # 3. Create the Python API files
  - |
    cat > solver_api/requirements.txt << 'EOF'
    fastapi
    uvicorn
    pydantic
    EOF

  - |
    cat > solver_api/solver_config.py << 'EOF'
    from typing import List, Dict, Optional
    from pydantic import BaseModel, Field

    class GameState(BaseModel):
        pot: float = Field(..., description="Current pot size")
        effective_stack: float = Field(..., description="Effective stack size")
        board: str = Field(..., description="Board cards separated by commas, e.g., 'Qs,Jh,2h'")
        range_ip: str = Field(..., description="In-position player's range string")
        range_oop: str = Field(..., description="Out-of-position player's range string")
        
        # Optional advanced settings with defaults
        allin_threshold: float = Field(0.67, description="All-in threshold for the solver")
        thread_num: int = Field(6, description="Number of CPU threads to use")
        accuracy: float = Field(0.5, description="Target exploitability accuracy (percent)")
        max_iteration: int = Field(200, description="Maximum number of solver iterations")

    def generate_solver_config_content(state: GameState, output_json_path: str) -> str:
        lines = []
        lines.append(f"set_pot {state.pot}")
        lines.append(f"set_effective_stack {state.effective_stack}")
        lines.append(f"set_board {state.board}")
        lines.append(f"set_range_ip {state.range_ip}")
        lines.append(f"set_range_oop {state.range_oop}")
        
        lines.extend([
            "set_bet_sizes oop,flop,bet,50",
            "set_bet_sizes oop,flop,raise,60",
            "set_bet_sizes oop,flop,allin",
            "set_bet_sizes ip,flop,bet,50",
            "set_bet_sizes ip,flop,raise,60",
            "set_bet_sizes ip,flop,allin",
            
            "set_bet_sizes oop,turn,bet,50",
            "set_bet_sizes oop,turn,raise,60",
            "set_bet_sizes oop,turn,allin",
            "set_bet_sizes ip,turn,bet,50",
            "set_bet_sizes ip,turn,raise,60",
            "set_bet_sizes ip,turn,allin",
            
            "set_bet_sizes oop,river,bet,50",
            "set_bet_sizes oop,river,donk,50",
            "set_bet_sizes oop,river,raise,60,100",
            "set_bet_sizes oop,river,allin",
            "set_bet_sizes ip,river,bet,50",
            "set_bet_sizes ip,river,raise,60,100",
            "set_bet_sizes ip,river,allin"
        ])

        lines.append(f"set_allin_threshold {state.allin_threshold}")
        lines.append("build_tree")
        lines.append(f"set_thread_num {state.thread_num}")
        lines.append(f"set_accuracy {state.accuracy}")
        lines.append(f"set_max_iteration {state.max_iteration}")
        lines.append("set_print_interval 10")
        lines.append("set_use_isomorphism 1")
        lines.append("start_solve")
        lines.append("set_dump_rounds 2")
        lines.append(f"dump_result {output_json_path}")
        
        return "\n".join(lines)
    EOF

  - |
    cat > solver_api/main.py << 'EOF'
    import os
    import json
    import uuid
    import subprocess
    from fastapi import FastAPI, HTTPException
    from fastapi.responses import JSONResponse
    import logging

    from solver_config import GameState, generate_solver_config_content

    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    app = FastAPI(title="TexasSolver API Wrapper")

    SOLVER_EXECUTABLE = os.getenv("SOLVER_PATH", "../console_solver")
    TEMP_DIR = "temp_runs"
    os.makedirs(TEMP_DIR, exist_ok=True)

    @app.post("/api/solve")
    async def solve_poker_state(state: GameState):
        run_id = str(uuid.uuid4())
        config_file_path = os.path.join(TEMP_DIR, f"config_{run_id}.txt")
        output_json_path = os.path.join(TEMP_DIR, f"output_{run_id}.json")
        
        try:
            config_content = generate_solver_config_content(state, output_json_path)
            with open(config_file_path, "w") as f:
                f.write(config_content)
        except Exception as e:
             raise HTTPException(status_code=500, detail=f"Failed to generate configuration: {str(e)}")

        try:
            config_rel_path = f"solver_api/{config_file_path}"
            process = subprocess.Popen(
                [SOLVER_EXECUTABLE, "-i", config_rel_path],
                cwd="..",
                stdout=subprocess.PIPE,
                stderr=subprocess.PIPE,
                text=True
            )
            stdout, stderr = process.communicate()
            
            if process.returncode != 0:
                raise HTTPException(status_code=500, detail="Solver execution failed.")
        except Exception as e:
            raise HTTPException(status_code=500, detail=f"Solver execution error: {str(e)}")
            
        try:
            if not os.path.exists(output_json_path):
                 raise HTTPException(status_code=500, detail="Solver finished but output JSON was not found.")
                 
            with open(output_json_path, 'r') as f:
                strategy_data = json.load(f)
                
            return JSONResponse(content={"status": "success", "run_id": run_id, "strategy": strategy_data})

        except json.JSONDecodeError:
             raise HTTPException(status_code=500, detail="Invalid JSON output from solver.")
        except Exception as e:
            raise HTTPException(status_code=500, detail=f"Error reading solver output: {str(e)}")

    @app.get("/health")
    def health_check():
        return {"status": "ok"}
    EOF

  # 4. Create the Dockerfile
  - |
    cat > Dockerfile << 'EOF'
    # Use Amazon Corretto or GitHub CR to avoid Docker Hub pull limits
    FROM public.ecr.aws/docker/library/python:3.10-slim
    RUN apt-get update && apt-get install -y libstdc++6 && rm -rf /var/lib/apt/lists/*
    WORKDIR /app
    COPY solver_api/requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt
    COPY solver_api/main.py .
    COPY solver_api/solver_config.py .
    COPY linux_bin/console_solver /app/console_solver
    RUN chmod +x /app/console_solver
    ENV SOLVER_PATH="/app/console_solver"
    EXPOSE 8000
    CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    EOF

  # 5. Download the TexasSolver Linux Release
  - mkdir -p /root/solver_project/linux_bin
  - wget https://github.com/bupticybee/TexasSolver/releases/download/v0.2.0/TexasSolver-v0.2.0-Linux.zip -O /root/solver_project/solver.zip
  - unzip /root/solver_project/solver.zip -d /root/solver_project/extracted_solver
  - mv /root/solver_project/extracted_solver/console_solver /root/solver_project/linux_bin/
  - chmod +x /root/solver_project/linux_bin/console_solver
  - rm -r /root/solver_project/extracted_solver /root/solver_project/solver.zip

  # 6. Build and Run the Docker container
  - docker build -t texassolver-api .
  - docker run -d --name solver_api_container -p 80:8000 --restart always texassolver-api
